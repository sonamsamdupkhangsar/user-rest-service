# Default values for mychart.
# This is a YAML-formatted file.
# Declare variables to be passed into your templates.

replicaCount: 1

image:
  repository: ghcr.io/sonamsamdupkhangsar/user-rest-service
  tag: multitenancy
  pullPolicy: Always

imagePullSecrets:
  - name: github-regcred
nameOverride: ""
fullnameOverride: "user-rest-service"

serviceAccount:
  # Specifies whether a service account should be created
  create: true
  # Annotations to add to the service account
  annotations: {}
  # The name of the service account to use.
  # If not set and create is true, a name is generated using the fullname template
  name:

rbac:
  create: true
  rules:
    - apiGroups:
        - ""
      resources:
        - services
        - endpoints
      verbs:
        - get
        - list
        - watch

podSecurityContext: {}
# fsGroup: 2000

securityContext: {}
  # capabilities:
  #   drop:
  #   - ALL
  # readOnlyRootFilesystem: true
  # runAsNonRoot: true
# runAsUser: 1000

service:
  type: ClusterIP
#  type: NodePort
  port: 80
  targetPort: 8080

istio:
  enabled: false

ingress:
  enabled: false

resources: {}
  # We usually recommend not to specify default resources and to leave this as a conscious
  # choice for the user. This also increases chances charts run on environments with little
  # resources, such as Minikube. If you do want to specify resources, uncomment the following
  # lines, adjust them as necessary, and remove the curly braces after 'resources:'.
  # limits:
  #   cpu: 100m
  #   memory: 128Mi
  # requests:
  #   cpu: 100m
#   memory: 128Mi

#nodeSelector:
#  node.kubernetes.io/instance-type: s-1vcpu-2gb

affinity: {}

postgres:
  port: "5432"
  service: user-db-rw
  secretfile: user-db-app
  dbname: user

envs:
  - name: DB_SSLMODE
    value: REQUIRE
  - name: SPRING_PROFILES_ACTIVE
    value: kubernetes
  - name: SPRING_CLOUD_KUBERNETES_DISCOVERY_NAMESPACES_0
    value: main
  - name: ISSUER_URI
    value: https://platform.openissuer.com/issuer
  - name: JWT_SET_URI
    value: https://platform.openissuer.com/issuer/oauth2/jwks
  - name: OAUTH_AUDIENCES
    value: oauth-client,nextjs-client
  - name: NEW_RELIC_ENABLED
    value: false

health:
  liveness:
    path: /users/api/health/liveness
    port: 8080
    initialDelaySeconds: 30
    periodSeconds: 5
    failureThreshold: 5
  readiness:
    path: /users/api/health/readiness
    port: 8080
    initialDelaySeconds: 30
    periodSeconds: 5
    failureThreshold: 5

secretFiles:
  - file: service-service-client-credential-flow-secret
    keys:
      - key: base64EncodedClientIdSecret
        name: BASE64_CLIENT_ID_SECRET
      - key: scopes
        name: REQUEST_SCOPES
